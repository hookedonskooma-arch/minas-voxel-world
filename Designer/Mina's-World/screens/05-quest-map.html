<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Mina's World - Quest Map</title>
  <link rel="stylesheet" href="../styles/mina-world.css">
</head>
<body class="phone-screen">
  <div class="ios-status"><span>9:41</span><span>5G 100%</span></div>
  <main class="app-shell">
    <nav class="topbar">
      <span class="avatar-chip">Quest Map</span>
      <button class="icon-btn" aria-label="Quest rewards">★</button>
    </nav>
    <section class="quest-card">
      <p class="kicker">Daily quest</p>
      <h2>Design a cloud garden</h2>
      <p style="margin-top: 9px;">Earn a moon bow by placing three cozy objects and naming your garden.</p>
      <div class="progress" style="margin-top: 14px; --value: 66%;"><span></span></div>
    </section>
    <section class="panel">
      <h3>Steps</h3>
      <div class="quest-row"><span>Add soft trees</span><span class="badge">Done</span></div>
      <div class="quest-row"><span>Invite one approved friend</span><span class="badge">Next</span></div>
      <div class="quest-row"><span>Choose a garden name</span><span class="badge">Locked</span></div>
    </section>
    <section class="grid-2">
      <article class="mini-card" style="background: color-mix(in oklch, var(--sky), white 40%);">
        <span class="badge">Learn</span>
        <strong>Shapes</strong>
        <p>Match roof patterns</p>
      </article>
      <article class="mini-card" style="background: color-mix(in oklch, var(--star), white 40%);">
        <span class="badge">Reward</span>
        <strong>Bow</strong>
        <p>Moon ribbon</p>
      </article>
    </section>
    <nav class="bottom-nav">
      <a href="01-onboarding.html">Home</a>
      <a href="02-avatar.html">Avatar</a>
      <a href="03-world-builder.html">Build</a>
      <a class="is-active" href="05-quest-map.html">Quests</a>
    </nav>
  </main>
</body>
</html>
