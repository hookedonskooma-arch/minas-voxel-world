<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Mina's World - Avatar Creator</title>
  <link rel="stylesheet" href="../styles/mina-world.css">
</head>
<body class="phone-screen">
  <div class="ios-status"><span>9:41</span><span>5G 100%</span></div>
  <main class="app-shell">
    <nav class="topbar">
      <span class="avatar-chip">Avatar Studio</span>
      <button class="icon-btn" aria-label="Save avatar">✓</button>
    </nav>
    <section class="panel">
      <div class="pill-tabs" aria-label="Avatar categories">
        <button class="is-active" data-tab="hair">Hair</button>
        <button data-tab="eyes">Eyes</button>
        <button data-tab="outfit">Outfit</button>
        <button data-tab="extras">Extras</button>
      </div>
      <div class="chibi-stage">
        <div class="chibi" id="chibi" style="--hair:oklch(24% 0.018 50);--outfit:oklch(55% 0.205 6);">
          <span class="hair-back"></span>
          <span class="body"></span>
          <span class="face">
            <span class="eye eye-l"></span>
            <span class="eye eye-r"></span>
            <span class="blush blush-l"></span>
            <span class="blush blush-r"></span>
            <span class="mouth"></span>
          </span>
          <span class="bangs"></span>
          <span class="streak"></span>
          <span class="bow"></span>
        </div>
      </div>
      <div class="palette-row" aria-label="Color choices">
        <button class="swatch" style="background:var(--violet);" data-part="hair" data-color="oklch(78% 0.12 298)" aria-label="Violet hair"></button>
        <button class="swatch" style="background:var(--bubble);" data-part="hair" data-color="oklch(88% 0.08 350)" aria-label="Pink hair"></button>
        <button class="swatch" style="background:var(--mint);" data-part="outfit" data-color="oklch(86% 0.11 164)" aria-label="Mint outfit"></button>
        <button class="swatch" style="background:var(--star);" data-part="outfit" data-color="oklch(90% 0.12 92)" aria-label="Star outfit"></button>
      </div>
    </section>
    <section class="sheet">
      <h3>Safety style rules</h3>
      <div class="safety-row"><span>No free text</span><span class="badge">On</span></div>
      <div class="safety-row"><span>Preset-only outfits</span><span class="badge">On</span></div>
    </section>
    <nav class="bottom-nav">
      <a href="01-onboarding.html">Home</a>
      <a class="is-active" href="02-avatar.html">Avatar</a>
      <a href="03-world-builder.html">Build</a>
      <a href="05-quest-map.html">Quests</a>
    </nav>
  </main>
  <script src="../scripts/mina-world.js"></script>
</body>
</html>
