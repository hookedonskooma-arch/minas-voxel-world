<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 880" width="1200" height="880" role="img" aria-label="Mina's World logo">
  <title>Mina's World</title>
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Baloo+2:wght@800&amp;display=swap');
      .mw-word{font-family:'Baloo 2','Quicksand','Varela Round','Arial Rounded MT Bold',system-ui,sans-serif;font-weight:800;}
    </style>
    <linearGradient id="mwHair" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3a2a22"/>
      <stop offset="1" stop-color="#1f1611"/>
    </linearGradient>
    <linearGradient id="mwShirt" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#e23b8d"/>
      <stop offset="1" stop-color="#bf2270"/>
    </linearGradient>
    <filter id="mwPuff" x="-25%" y="-25%" width="150%" height="160%">
      <feDropShadow dx="0" dy="13" stdDeviation="9" flood-color="#c5a3e6" flood-opacity="0.5"/>
    </filter>
    <filter id="mwSoft" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="8" stdDeviation="7" flood-color="#b07ad0" flood-opacity="0.35"/>
    </filter>
    <g id="mwStar">
      <path d="M0,-15 C2.6,-4.5 4.5,-2.6 15,0 C4.5,2.6 2.6,4.5 0,15 C-2.6,4.5 -4.5,2.6 -15,0 C-4.5,-2.6 -2.6,-4.5 0,-15 Z"/>
    </g>
  </defs>

  <!-- decorative clouds + sparkles -->
  <g opacity="0.95">
    <g fill="#ffffff" stroke="#cdb8f0" stroke-width="6">
      <path d="M150 430 a40 40 0 0 1 76 -14 a34 34 0 0 1 56 22 a30 30 0 0 1 -10 58 h-104 a32 32 0 0 1 -18 -66 Z"/>
      <path d="M935 318 a34 34 0 0 1 64 -12 a28 28 0 0 1 46 18 a26 26 0 0 1 -10 49 h-88 a27 27 0 0 1 -12 -55 Z"/>
    </g>
    <use href="#mwStar" transform="translate(252,250) scale(1.5)" fill="#ffd64a"/>
    <use href="#mwStar" transform="translate(960,470) scale(1.9)" fill="#ff9ecb"/>
    <use href="#mwStar" transform="translate(168,612) scale(1.3)" fill="#9bd9ff"/>
    <use href="#mwStar" transform="translate(1030,690) scale(1.5)" fill="#ffd64a"/>
    <use href="#mwStar" transform="translate(820,158) scale(1)" fill="#ff9ecb"/>
  </g>

  <!-- chibi Mina, facing forward, perched on the letters — matches the avatar -->
  <g filter="url(#mwSoft)">
    <!-- legs -->
    <path d="M566 414 C560 438 560 460 566 476 C570 484 584 484 588 476 C594 460 594 438 588 414 Z" fill="#f7e3d0"/>
    <path d="M634 414 C640 438 640 460 634 476 C630 484 616 484 612 476 C606 460 606 438 612 414 Z" fill="#f7e3d0"/>
    <!-- shoes -->
    <path d="M556 472 C549 472 545 484 550 493 C555 502 592 502 597 493 C601 484 597 472 590 472 Z" fill="#ffffff" stroke="#e7d6ff" stroke-width="3"/>
    <path d="M610 472 C603 472 599 484 603 493 C608 502 645 502 650 493 C655 484 651 472 644 472 Z" fill="#ffffff" stroke="#e7d6ff" stroke-width="3"/>
    <path d="M551 494 C560 501 590 501 598 494" fill="none" stroke="#ff8fc4" stroke-width="7" stroke-linecap="round"/>
    <path d="M604 494 C613 501 643 501 651 494" fill="none" stroke="#ff8fc4" stroke-width="7" stroke-linecap="round"/>
    <!-- arms draped over the letters (short, hands resting near the top) -->
    <path d="M520 332 C506 348 500 372 504 392 C507 404 524 404 528 392 C530 372 538 352 550 342 Z" fill="#f7e3d0"/>
    <path d="M680 332 C694 348 700 372 696 392 C693 404 676 404 672 392 C670 372 662 352 650 342 Z" fill="#f7e3d0"/>
    <circle cx="515" cy="396" r="15" fill="#f7e3d0"/>
    <circle cx="685" cy="396" r="15" fill="#f7e3d0"/>
    <!-- torso / shirt (Mina's magenta top) -->
    <ellipse cx="518" cy="320" rx="30" ry="26" fill="url(#mwShirt)"/>
    <ellipse cx="682" cy="320" rx="30" ry="26" fill="url(#mwShirt)"/>
    <path d="M600 298 C546 298 518 314 514 354 L510 394 C508 412 522 422 540 422 L660 422 C678 422 692 412 690 394 L686 354 C682 314 654 298 600 298 Z" fill="url(#mwShirt)"/>
    <!-- hair (back of bob) -->
    <ellipse cx="600" cy="190" rx="128" ry="138" fill="url(#mwHair)"/>
    <!-- face -->
    <ellipse cx="600" cy="214" rx="96" ry="100" fill="#f7e3d0" stroke="#eccdb4" stroke-width="2"/>
    <!-- bangs / fringe framing the face -->
    <path d="M506 150 C506 112 694 112 694 150 C694 178 678 190 662 174 C652 196 624 196 614 176 C606 196 578 196 570 176 C558 192 532 190 522 172 C512 186 506 178 506 150 Z" fill="url(#mwHair)"/>
    <!-- bleached blonde streak — left front lock of the fringe, stays inside the hair -->
    <path d="M508 152 C508 122 560 112 568 118 C557 132 552 150 551 172 C549 188 532 190 523 175 C515 184 509 176 508 152 Z" fill="#f0e4a8"/>
    <path d="M524 132 C513 144 510 158 511 170" fill="none" stroke="#f9f1cc" stroke-width="6" stroke-linecap="round"/>
    <!-- eyes -->
    <ellipse cx="566" cy="222" rx="23" ry="29" fill="#2c4f87"/>
    <ellipse cx="634" cy="222" rx="23" ry="29" fill="#2c4f87"/>
    <ellipse cx="566" cy="237" rx="15" ry="8" fill="#5377ad"/>
    <ellipse cx="634" cy="237" rx="15" ry="8" fill="#5377ad"/>
    <circle cx="576" cy="212" r="8" fill="#ffffff"/>
    <circle cx="644" cy="212" r="8" fill="#ffffff"/>
    <circle cx="558" cy="232" r="4.5" fill="#ffffff" opacity="0.7"/>
    <circle cx="626" cy="232" r="4.5" fill="#ffffff" opacity="0.7"/>
    <!-- blush -->
    <ellipse cx="538" cy="250" rx="22" ry="12" fill="#f3bdce" opacity="0.9"/>
    <ellipse cx="662" cy="250" rx="22" ry="12" fill="#f3bdce" opacity="0.9"/>
    <!-- tiny happy smile -->
    <path d="M588 257 C593 269 607 269 612 257" fill="none" stroke="#d77f6b" stroke-width="6" stroke-linecap="round"/>
    <!-- pink bow -->
    <path d="M600 90 C560 66 538 86 548 108 C556 124 588 106 600 98 Z" fill="#ff8fc4"/>
    <path d="M600 90 C640 66 662 86 652 108 C644 124 612 106 600 98 Z" fill="#ff8fc4"/>
    <path d="M566 76 C560 88 562 100 569 106" fill="none" stroke="#ff6fb0" stroke-width="5" stroke-linecap="round"/>
    <path d="M634 76 C640 88 638 100 631 106" fill="none" stroke="#ff6fb0" stroke-width="5" stroke-linecap="round"/>
    <circle cx="600" cy="93" r="14" fill="#ff6fb0"/>
    <circle cx="595" cy="89" r="4.5" fill="#ffd0e6"/>
  </g>

  <!-- puffy cloud wordmark -->
  <g filter="url(#mwPuff)">
    <text class="mw-word" x="600" y="636" font-size="156" text-anchor="middle"
          fill="#f3c2dd">Mina's</text>
    <text class="mw-word" x="600" y="636" font-size="156" text-anchor="middle"
          fill="#ffffff" stroke="#b596ec" stroke-width="21" stroke-linejoin="round"
          paint-order="stroke">Mina's</text>
    <text class="mw-word" x="600" y="812" font-size="178" text-anchor="middle"
          fill="#f3c2dd">World</text>
    <text class="mw-word" x="600" y="812" font-size="178" text-anchor="middle"
          fill="#ffffff" stroke="#b596ec" stroke-width="23" stroke-linejoin="round"
          paint-order="stroke">World</text>
  </g>
</svg>
